server:
  port: 9090

app:
  api-key: ${apikey}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5500"
              - "http://127.0.0.1:5500"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true

      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/Users/**
          filters:
            - ApiKeyValidation

        - id: customer-service
          uri: http://localhost:4002
          predicates:
            - Path=/customers/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "FARMER,ADMIN"

        - id: payment-service
          uri: http://localhost:8090
          predicates:
            - Path=/payments/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "FARMER,ADMIN"

        - id: farmer-service
          uri: http://localhost:7070
          predicates:
            - Path=/farmer/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "FARMER,ADMIN"

        - id: farmer-goods-service
          uri: http://localhost:7071
          predicates:
            - Path=/products/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "FARMER,ADMIN"

        - id: buyer-service
          uri: http://localhost:7072
          predicates:
            - Path=/buyer/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "BUYER,ADMIN"

                # Buyer → only GET
        - id: product-get
          uri: http://localhost:7071
          predicates:
            - Path=/products/**
            - Method=GET
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "BUYER"
