server:
  port: 9090

app:
  api-key: ${apikey}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5500"
              - "http://127.0.0.1:5500"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
      routes:

        # AUTH — public, only API key check
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/Users/**
          filters:
            - ApiKeyValidation

        # PRODUCTS — GET is open to BUYER and FARMER
        # PUT/POST/DELETE only for FARMER
        - id: products-buyer-get
          uri: http://localhost:7071
          predicates:
            - Path=/products/**
            - Method=GET
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "FARMER,BUYER"   # ← both can browse products

        - id: products-farmer-write
          uri: http://localhost:7071
          predicates:
            - Path=/products/**
            - Method=POST,PUT,DELETE
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "FARMER"         # ← only farmer can add/edit/delete

        # FARMER SERVICE — profile management
        - id: farmer-service
          uri: http://localhost:7070
          predicates:
            - Path=/farmer/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "FARMER"

        # BUYER SERVICE — profile management
        - id: buyer-service
          uri: http://localhost:7072
          predicates:
            - Path=/buyer/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "BUYER"          # ← fixed, was FARMER,ADMIN

        # ORDER SERVICE
        - id: order-service
          uri: http://localhost:7073           # ← change to your actual port
          predicates:
            - Path=/orders/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "FARMER,BUYER"   # ← both need orders

        # PAYMENT SERVICE
        - id: payment-service
          uri: http://localhost:8090
          predicates:
            - Path=/payments/**
          filters:
            - name: JwtValidation
              args:
                allowedRoles: "BUYER"          # ← fixed, was FARMER,ADMIN
